{% extends "base.html" %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 fade-in" x-data="registerForm()">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-xl">
        <div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                Create an Account
            </h2>
        </div>
        <form class="mt-8 space-y-6" @submit.prevent="submitForm">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">I want to:</label>
                    <div class="mt-2 flex space-x-4">
                        <label class="inline-flex items-center">
                            <input type="radio" x-model="formData.role" value="donor" class="text-smartgreen-600 focus:ring-smartgreen-500">
                            <span class="ml-2 text-gray-700">Donate Food</span>
                        </label>
                        <label class="inline-flex items-center">
                            <input type="radio" x-model="formData.role" value="receiver" class="text-smartgreen-600 focus:ring-smartgreen-500">
                            <span class="ml-2 text-gray-700">Receive Food</span>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Username</label>
                    <input type="text" x-model="formData.username" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-smartgreen-500 focus:border-smartgreen-500 sm:text-sm">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" x-model="formData.password" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-smartgreen-500 focus:border-smartgreen-500 sm:text-sm">
                </div>

                <div x-show="formData.role === 'donor'" x-transition>
                    <label class="block text-sm font-medium text-gray-700">Organization / Restaurant Name (Optional)</label>
                    <input type="text" x-model="formData.organization_name" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-smartgreen-500 focus:border-smartgreen-500 sm:text-sm">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">City (Optional)</label>
                    <input type="text" x-model="formData.city" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-smartgreen-500 focus:border-smartgreen-500 sm:text-sm" placeholder="e.g. Karachi, Lahore">
                </div>
            </div>

            <div>
                <button type="submit" :disabled="loading"
                        class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-smartgreen-600 hover:bg-smartgreen-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-smartgreen-500 transition transform hover:-translate-y-0.5 disabled:opacity-50">
                    <span x-show="!loading">Register</span>
                    <span x-show="loading">Registering...</span>
                </button>
            </div>
            <div x-show="errorMsg" class="text-red-500 text-sm text-center mt-2" x-text="errorMsg"></div>
        </form>
    </div>
</div>

<script>
function registerForm() {
    return {
        formData: {
            username: '',
            password: '',
            role: 'donor',
            organization_name: '',
            city: ''
        },
        loading: false,
        errorMsg: '',
        async submitForm() {
            this.loading = true;
            this.errorMsg = '';
            
            const payload = { ...this.formData };
            if (!payload.organization_name) delete payload.organization_name;
            if (!payload.city) delete payload.city;

            try {
                const res = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Registration failed');
                
                window.showToast('Registered successfully! Please login.');
                setTimeout(() => {
                    window.location.href = '/login';
                }, 1000);
            } catch (err) {
                this.errorMsg = err.message;
            } finally {
                this.loading = false;
            }
        }
    }
}
</script>
{% endblock %}
