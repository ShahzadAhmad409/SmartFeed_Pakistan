{% extends "base.html" %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 fade-in" x-data="ngoRequestForm()">
    <div class="max-w-xl w-full space-y-8 bg-white p-10 rounded-xl shadow-xl">
        <div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                NGO Verification Request
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                Join our network of verified welfare organizations to help redistribute surplus food efficiently.
            </p>
        </div>
        <form class="mt-8 space-y-6" @submit.prevent="submitForm">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Organization Name</label>
                    <input type="text" x-model="formData.organization_name" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-smartgreen-500 focus:border-smartgreen-500 sm:text-sm">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700">Registration Number (Government Issued)</label>
                    <input type="text" x-model="formData.registration_number" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-smartgreen-500 focus:border-smartgreen-500 sm:text-sm">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Contact Information (Email / Phone)</label>
                    <input type="text" x-model="formData.contact_info" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-smartgreen-500 focus:border-smartgreen-500 sm:text-sm">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">City</label>
                    <input type="text" x-model="formData.city" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-smartgreen-500 focus:border-smartgreen-500 sm:text-sm" placeholder="e.g. Karachi">
                </div>
            </div>

            <div x-show="successMsg" class="p-4 bg-green-100 text-green-700 rounded-md text-sm" x-text="successMsg"></div>
            <div x-show="errorMsg" class="p-4 bg-red-100 text-red-700 rounded-md text-sm" x-text="errorMsg"></div>

            <div>
                <button type="submit" :disabled="loading"
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-smartgreen-600 hover:bg-smartgreen-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-smartgreen-500 transition transform hover:-translate-y-0.5 disabled:opacity-50">
                    <span x-show="!loading">Submit Request</span>
                    <span x-show="loading">Submitting...</span>
                </button>
            </div>
        </form>
    </div>
</div>

<script>
function ngoRequestForm() {
    return {
        formData: {
            organization_name: '',
            registration_number: '',
            contact_info: '',
            city: ''
        },
        loading: false,
        errorMsg: '',
        successMsg: '',
        async submitForm() {
            this.loading = true;
            this.errorMsg = '';
            this.successMsg = '';

            try {
                const res = await fetch('/api/ngo-request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(this.formData)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Submission failed');
                
                this.successMsg = 'Your request has been submitted successfully and is pending approval from the super-admin.';
                this.formData = { organization_name: '', registration_number: '', contact_info: '', city: '' };
                window.showToast('Request submitted!');
            } catch (err) {
                this.errorMsg = err.message;
            } finally {
                this.loading = false;
            }
        }
    }
}
</script>
{% endblock %}
